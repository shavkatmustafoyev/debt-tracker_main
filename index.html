<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0A0A0F;--bg2:#111118;--bg3:#18181f;--bg4:#1e1e28;
--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
--text:#F2F0EC;--text2:#9B99A8;--text3:#5C5A6A;
--accent:#C8F46A;--accent2:#9EDB3A;--accent-dim:rgba(200,244,106,0.12);--accent-dim2:rgba(200,244,106,0.06);
--red:#FF5252;--amber:#FFC542;--blue:#60A5FA;
--radius:14px;--radius-sm:8px;--radius-lg:20px;
--font-display:'Syne',sans-serif;--font-serif:'Instrument Serif',serif;--font-mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-display);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
button{cursor:pointer;font-family:var(--font-display)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(200,244,106,0.4)}70%{box-shadow:0 0 0 12px rgba(200,244,106,0)}100%{box-shadow:0 0 0 0 rgba(200,244,106,0)}}
@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(60px) rotate(360deg);opacity:0}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect}=React;

const bankCredits=[

{id:"ipak",name:"Ipak Yo'li Bank",color:"#8B5CF6",payDay:10,totalSum:10025000,schedule:[{month:"2026-06",amount:231000},{month:"2026-07",amount:223000},{month:"2026-08",amount:432000},{month:"2026-09",amount:443000},{month:"2026-10",amount:442000},{month:"2026-11",amount:415000},{month:"2026-12",amount:413000},{month:"2027-01",amount:417000},{month:"2027-02",amount:398000},{month:"2027-03",amount:380000},{month:"2027-04",amount:398000},{month:"2027-05",amount:365000},{month:"2027-06",amount:372000},{month:"2027-07",amount:368000},{month:"2027-08",amount:348000},{month:"2027-09",amount:348000},{month:"2027-10",amount:340000},{month:"2027-11",amount:329000},{month:"2027-12",amount:321000},{month:"2028-01",amount:316000},{month:"2028-02",amount:308000},{month:"2028-03",amount:296000},{month:"2028-04",amount:293000},{month:"2028-05",amount:283000},{month:"2028-06",amount:280000},{month:"2028-07",amount:265000},{month:"2028-08",amount:261000},{month:"2028-09",amount:254000},{month:"2028-10",amount:244000},{month:"2028-11",amount:242000}]},
{id:"cc",name:"Credit Card",color:"#EF4444",payDay:10,totalSum:31200000,schedule:[{month:"2026-06",amount:2600000},{month:"2026-07",amount:2600000},{month:"2026-08",amount:2600000},{month:"2026-09",amount:2600000},{month:"2026-10",amount:2600000},{month:"2026-11",amount:2600000},{month:"2026-12",amount:2600000},{month:"2027-01",amount:2600000},{month:"2027-02",amount:2600000},{month:"2027-03",amount:2600000},{month:"2027-04",amount:2600000},{month:"2027-05",amount:2600000}]},
{id:"tbc",name:"TBC Bank",color:"#10B981",payDay:18,totalSum:15603000,schedule:[{month:"2026-06",amount:743000},{month:"2026-07",amount:743000},{month:"2026-08",amount:743000},{month:"2026-09",amount:743000},{month:"2026-10",amount:743000},{month:"2026-11",amount:743000},{month:"2026-12",amount:743000},{month:"2027-01",amount:743000},{month:"2027-02",amount:743000},{month:"2027-03",amount:743000},{month:"2027-04",amount:743000},{month:"2027-05",amount:743000},{month:"2027-06",amount:743000},{month:"2027-07",amount:743000},{month:"2027-08",amount:743000},{month:"2027-09",amount:743000},{month:"2027-10",amount:743000},{month:"2027-11",amount:743000},{month:"2027-12",amount:743000},{month:"2028-01",amount:743000},{month:"2028-02",amount:743000}]},
{id:"uzum3",name:"Uzum Bank #3",color:"#3B82F6",payDay:18,totalSum:3780000,schedule:[{month:"2026-06",amount:756000},{month:"2026-07",amount:756000},{month:"2026-08",amount:756000},{month:"2026-09",amount:756000},{month:"2026-10",amount:756000}]},
{id:"uzum4",name:"Uzum Bank #4",color:"#60A5FA",payDay:18,totalSum:3740000,schedule:[{month:"2026-06",amount:340000},{month:"2026-07",amount:340000},{month:"2026-08",amount:340000},{month:"2026-09",amount:340000},{month:"2026-10",amount:340000},{month:"2026-11",amount:340000},{month:"2026-12",amount:340000},{month:"2027-01",amount:340000},{month:"2027-02",amount:340000},{month:"2027-03",amount:340000},{month:"2027-04",amount:340000},{month:"2027-05",amount:340000}]},
{id:"uzum5",name:"Uzum Bank #5",color:"#93C5FD",payDay:26,totalSum:2412000,schedule:[{month:"2026-06",amount:603000},{month:"2026-07",amount:603000},{month:"2026-08",amount:603000},{month:"2026-09",amount:603000},{month:"2026-10",amount:603000}]},
];
const personalDebts=[
{id:"elchin",name:"Elchin",amount:1800000,priority:1,mustPayJune:true},
{id:"bobir",name:"Bobir",amount:821000,priority:2,mustPayJune:true},
{id:"onam",name:"Onam",amount:2150000,priority:3,mustPayJune:false},
];
const adDebts=[
{id:"ad1",name:"3-BM | #1 Ad account",amountUSD:30,amountUZS:30*USD_RATE},
{id:"ad2",name:"Team Up BM | #1",amountUSD:45,amountUZS:45*USD_RATE},
{id:"ad3",name:"4-BM | #1 Ad account",amountUSD:60,amountUZS:60*USD_RATE},
{id:"ad4",name:"4-BM | #2 Ad account",amountUSD:115,amountUZS:115*USD_RATE},
{id:"ad5",name:"3-BM | #1 (2)",amountUSD:150,amountUZS:150*USD_RATE},
{id:"ad6",name:"3-BM | #1 (3)",amountUSD:155,amountUZS:155*USD_RATE},
];
const formatSum=n=>new Intl.NumberFormat("uz-UZ").format(Math.round(n))+" so'm";
const currentMonth=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`};
const getMonthLabel=(m,short)=>{const L=short?['Yan','Fev','Mar','Apr','May','Iyu','Iyu','Avg','Sen','Okt','Noy','Dek']:['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktyabr','Noyabr','Dekabr'];const[y,mm]=m.split('-').map(Number);return `${L[mm-1]} ${y}`};

// ============ localStorage hook ============
function useLS(key,init){
const[v,setV]=useState(()=>{try{const i=localStorage.getItem(key);return i?JSON.parse(i):init}catch{return init}});
const set=val=>{try{const s=val instanceof Function?val(v):val;setV(s);localStorage.setItem(key,JSON.stringify(s))}catch(e){console.error(e)}};
return[v,set];
}

// ============ Shared components ============
function PayRow({label,sub,amount,paid,onToggle,urgent,index}){
return(<div onClick={onToggle} style={{background:paid?'rgba(200,244,106,0.04)':'var(--bg3)',border:`1px solid ${paid?'rgba(200,244,106,0.2)':urgent?'rgba(255,197,66,0.2)':'var(--border)'}`,borderRadius:'var(--radius-sm)',padding:'14px 16px',display:'flex',alignItems:'center',gap:14,transition:'all 0.25s',animation:`fadeUp 0.3s ease ${index*0.05}s both`,cursor:'pointer'}}>
<div style={{width:28,height:28,borderRadius:'50%',flexShrink:0,border:`2px solid ${paid?'var(--accent)':urgent?'var(--amber)':'var(--border2)'}`,background:paid?'var(--accent)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.25s'}}>{paid&&<span style={{fontSize:13,color:'#0A0A0F',fontWeight:700}}>✓</span>}</div>
<div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:500,color:paid?'var(--text2)':'var(--text)',textDecoration:paid?'line-through':'none',transition:'color 0.25s'}}>{label}</div>{sub&&<div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{sub}</div>}</div>
<div style={{fontFamily:'var(--font-mono)',fontSize:13,fontWeight:500,color:paid?'var(--accent)':'var(--text)',textAlign:'right'}}>{amount}</div>
</div>);
}
function CategoryBadge({cat}){
const c={'Insondan qarz':{bg:'rgba(255,197,66,0.12)',text:'#FFC542'},'Ad account ($)':{bg:'rgba(96,165,250,0.12)',text:'#60A5FA'},'Bank krediti':{bg:'rgba(200,244,106,0.08)',text:'var(--accent)'}}[cat]||{bg:'var(--bg4)',text:'var(--text2)'};
return<span style={{fontSize:10,padding:'2px 8px',borderRadius:10,fontWeight:500,letterSpacing:'0.04em',background:c.bg,color:c.text}}>{cat.toUpperCase()}</span>;
}

// ============ DASHBOARD ============
// ============ MONTH PLAN (manual) ============
function MonthPlan({month,monthLabel,targets,toggleTarget,addTarget,removeTarget,paidCredits,paidPersonal,paidAd}){
const[adding,setAdding]=useState(false);
const[picked,setPicked]=useState(null);
// Available debts not yet in this month's targets and not fully paid
const inList=(id,type)=>targets.some(t=>t.id===id&&t.type===type);
const available=[
...personalDebts.filter(d=>!paidPersonal[d.id]&&!inList(d.id,'personal')).map(d=>({id:d.id,type:'personal',name:d.name,amount:d.amount,cat:'Inson'})),
...adDebts.filter(d=>!paidAd[d.id]&&!inList(d.id,'ad')).map(d=>({id:d.id,type:'ad',name:d.name,amount:d.amountUZS,cat:'Ad $'})),
...bankCredits.flatMap(c=>{const p=c.schedule.find(s=>s.month===month);return(p&&!paidCredits[`${c.id}:${month}`]&&!inList(c.id,'credit'))?[{id:c.id,type:'credit',name:c.name,amount:p.amount,cat:'Kredit'}]:[]}),
];
const confirmAdd=(status)=>{if(picked){addTarget(month,{id:picked.id,type:picked.type,status});setPicked(null);setAdding(false)}};
const catColor=c=>({'Inson':'#FFC542','Ad $':'#60A5FA','Kredit':'#C8F46A'}[c]||'var(--text2)');
return(<div>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
<span style={{fontSize:11,color:'var(--text3)',letterSpacing:'0.1em'}}>BU OY UCHUN REJAM</span>
<button onClick={()=>{setAdding(!adding);setPicked(null)}} style={{background:adding?'var(--bg4)':'var(--accent-dim)',border:`1px solid ${adding?'var(--border2)':'rgba(200,244,106,0.3)'}`,borderRadius:20,padding:'4px 12px',fontSize:12,fontWeight:500,color:adding?'var(--text2)':'var(--accent)',display:'flex',alignItems:'center',gap:5}}>{adding?'✕ Yopish':'+ Qarz qo\u2019shish'}</button>
</div>

{/* Add flow */}
{adding&&(<div style={{background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:'var(--radius)',padding:'14px',marginBottom:12,animation:'scaleIn 0.2s ease both'}}>
{!picked?(<div>
<div style={{fontSize:12,color:'var(--text2)',marginBottom:10}}>Qaysi qarzni qo'shamiz?</div>
{available.length===0?(<div style={{fontSize:12,color:'var(--text3)',textAlign:'center',padding:'12px'}}>Qo'shadigan qarz qolmadi 🎉</div>):(
<div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:260,overflowY:'auto'}}>
{available.map(d=>(<div key={`${d.type}:${d.id}`} onClick={()=>setPicked(d)} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--bg4)',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',cursor:'pointer'}}>
<div style={{width:7,height:7,borderRadius:'50%',background:catColor(d.cat),flexShrink:0}}/>
<span style={{flex:1,fontSize:13,color:'var(--text)'}}>{d.name}</span>
<span style={{fontSize:10,color:catColor(d.cat)}}>{d.cat}</span>
<span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--text2)'}}>{formatSum(d.amount)}</span>
</div>))}
</div>)}
</div>):(<div>
<div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14,padding:'10px 12px',background:'var(--bg4)',borderRadius:'var(--radius-sm)'}}>
<span style={{flex:1,fontSize:14,fontWeight:500}}>{picked.name}</span>
<span style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--accent)'}}>{formatSum(picked.amount)}</span>
</div>
<div style={{fontSize:12,color:'var(--text2)',marginBottom:10}}>Statusni tanlang:</div>
<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
<button onClick={()=>confirmAdd('maqsad')} style={{background:'var(--accent-dim)',border:'1px solid rgba(200,244,106,0.3)',borderRadius:'var(--radius-sm)',padding:'14px',color:'var(--accent)',display:'flex',flexDirection:'column',gap:3,alignItems:'center'}}><span style={{fontSize:18}}>🎯</span><span style={{fontSize:13,fontWeight:600}}>Maqsad</span><span style={{fontSize:10,color:'var(--text3)'}}>Majburiy to'lash</span></button>
<button onClick={()=>confirmAdd('ixtiyoriy')} style={{background:'var(--bg4)',border:'1px solid var(--border2)',borderRadius:'var(--radius-sm)',padding:'14px',color:'var(--text2)',display:'flex',flexDirection:'column',gap:3,alignItems:'center'}}><span style={{fontSize:18}}>💭</span><span style={{fontSize:13,fontWeight:600}}>Ixtiyoriy</span><span style={{fontSize:10,color:'var(--text3)'}}>Imkon bo'lsa</span></button>
</div>
<button onClick={()=>setPicked(null)} style={{marginTop:10,width:'100%',background:'transparent',border:'none',color:'var(--text3)',fontSize:12,padding:'6px'}}>← Orqaga</button>
</div>)}
</div>)}

{/* Target list */}
{targets.length===0&&!adding?(<div style={{background:'var(--bg3)',border:'1px dashed var(--border2)',borderRadius:'var(--radius)',padding:'20px',textAlign:'center'}}>
<div style={{fontSize:13,color:'var(--text3)'}}>Bu oy uchun hali qarz qo'shilmagan</div>
<div style={{fontSize:12,color:'var(--text3)',marginTop:4}}>"+ Qarz qo'shish" tugmasini bosing</div>
</div>):(<div style={{display:'flex',flexDirection:'column',gap:8}}>
{targets.map((t,i)=>(<div key={`${t.type}:${t.id}`} style={{position:'relative',background:t.paid?'rgba(200,244,106,0.04)':'var(--bg3)',border:`1px solid ${t.paid?'rgba(200,244,106,0.2)':t.status==='maqsad'?'rgba(200,244,106,0.18)':'var(--border)'}`,borderRadius:'var(--radius-sm)',padding:'14px 16px',display:'flex',alignItems:'center',gap:12,animation:`fadeUp 0.3s ease ${i*0.05}s both`}}>
<div onClick={()=>toggleTarget(t)} style={{width:28,height:28,borderRadius:'50%',flexShrink:0,border:`2px solid ${t.paid?'var(--accent)':t.status==='maqsad'?'var(--accent)':'var(--border2)'}`,background:t.paid?'var(--accent)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{t.paid&&<span style={{fontSize:13,color:'#0A0A0F',fontWeight:700}}>✓</span>}</div>
<div onClick={()=>toggleTarget(t)} style={{flex:1,minWidth:0,cursor:'pointer'}}>
<div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}><span style={{fontSize:14,fontWeight:500,color:t.paid?'var(--text2)':'var(--text)',textDecoration:t.paid?'line-through':'none'}}>{t.name}</span>
<span style={{fontSize:9,padding:'2px 7px',borderRadius:8,fontWeight:500,background:t.status==='maqsad'?'var(--accent-dim)':'var(--bg4)',color:t.status==='maqsad'?'var(--accent)':'var(--text3)'}}>{t.status==='maqsad'?'🎯 MAQSAD':'💭 IXTIYORIY'}</span></div>
</div>
<span style={{fontFamily:'var(--font-mono)',fontSize:13,fontWeight:500,color:t.paid?'var(--accent)':'var(--text)'}}>{formatSum(t.amount)}</span>
<button onClick={()=>removeTarget(month,t.id,t.type)} style={{background:'transparent',border:'none',color:'var(--text3)',fontSize:15,padding:'2px 4px',flexShrink:0}} aria-label="O'chirish">✕</button>
</div>))}
</div>)}
</div>);
}

function Dashboard({paidCredits,paidPersonal,paidAd,toggleCredit,togglePersonal,toggleAd,stats,setPage,monthTargets,addTarget,removeTarget}){
const month=currentMonth();
const monthLabel=getMonthLabel(month);
const monthCredits=bankCredits.flatMap(c=>{const p=c.schedule.find(s=>s.month===month);return p?[{...c,amount:p.amount,paid:!!paidCredits[`${c.id}:${month}`]}]:[]});
const targets=monthTargets[month]||[];
// resolve each target -> {amount, paid, label}
const resolveTarget=t=>{
  if(t.type==='personal'){const d=personalDebts.find(x=>x.id===t.id);return d?{...t,name:d.name,amount:d.amount,paid:!!paidPersonal[d.id]}:null}
  if(t.type==='ad'){const d=adDebts.find(x=>x.id===t.id);return d?{...t,name:d.name,amount:d.amountUZS,paid:!!paidAd[d.id]}:null}
  if(t.type==='credit'){const c=bankCredits.find(x=>x.id===t.id);const p=c&&c.schedule.find(s=>s.month===month);return c&&p?{...t,name:c.name,amount:p.amount,paid:!!paidCredits[`${c.id}:${month}`]}:null}
  return null;
};
const resolvedTargets=targets.map(resolveTarget).filter(Boolean);
const toggleTarget=t=>{if(t.type==='personal')togglePersonal(t.id);else if(t.type==='ad')toggleAd(t.id);else if(t.type==='credit')toggleCredit(t.id,month)};
// "Maqsad" targets count toward this month's mandatory total
const goalTargets=resolvedTargets.filter(t=>t.status==='maqsad');
const totalThisMonth=monthCredits.reduce((s,c)=>s+c.amount,0)+goalTargets.filter(t=>t.type!=='credit').reduce((s,t)=>s+t.amount,0);
const paidThisMonth=monthCredits.filter(c=>c.paid).reduce((s,c)=>s+c.amount,0)+goalTargets.filter(t=>t.type!=='credit'&&t.paid).reduce((s,t)=>s+t.amount,0);
const remainingThisMonth=totalThisMonth-paidThisMonth;
const monthPct=totalThisMonth>0?Math.round((paidThisMonth/totalThisMonth)*100):0;
return(<div style={{display:'flex',flexDirection:'column',gap:24,animation:'fadeUp 0.4s ease both'}}>
<div><div style={{fontSize:12,color:'var(--text3)',letterSpacing:'0.1em',marginBottom:6}}>JORIY OY</div><h1 style={{fontFamily:'var(--font-serif)',fontStyle:'italic',fontSize:36,fontWeight:400,lineHeight:1}}>{monthLabel}</h1></div>
<div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
{[{label:"Jami to'lov",value:formatSum(totalThisMonth),color:'var(--text)'},{label:"To'landi",value:formatSum(paidThisMonth),color:'var(--accent)'},{label:"Qoldi",value:formatSum(remainingThisMonth),color:remainingThisMonth>0?'var(--red)':'var(--accent)'}].map(c=>(
<div key={c.label} style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'14px 12px'}}><div style={{fontSize:11,color:'var(--text3)',marginBottom:6,letterSpacing:'0.06em'}}>{c.label.toUpperCase()}</div><div style={{fontFamily:'var(--font-mono)',fontSize:13,fontWeight:500,color:c.color,wordBreak:'break-all'}}>{c.value}</div></div>))}
</div>
<div><div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span style={{fontSize:12,color:'var(--text3)'}}>Oylik progress</span><span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--accent)',fontWeight:500}}>{monthPct}%</span></div>
<div style={{height:8,background:'var(--bg4)',borderRadius:4,overflow:'hidden'}}><div style={{height:'100%',borderRadius:4,background:'linear-gradient(90deg,var(--accent2),var(--accent))',width:`${monthPct}%`,transition:'width 0.6s cubic-bezier(0.4,0,0.2,1)',boxShadow:monthPct>0?'0 0 12px rgba(200,244,106,0.5)':'none'}}/></div></div>
{monthCredits.length>0&&(<div><div style={{fontSize:11,color:'var(--text3)',letterSpacing:'0.1em',marginBottom:12}}>{`BANK KREDITLARI — ${monthLabel}`.toUpperCase()}</div><div style={{display:'flex',flexDirection:'column',gap:8}}>{monthCredits.map((c,i)=><PayRow key={c.id} index={i} label={c.name} sub={`${c.payDay}-sanasida`} amount={formatSum(c.amount)} paid={c.paid} onToggle={()=>toggleCredit(c.id,month)}/>)}</div></div>)}
<MonthPlan month={month} monthLabel={monthLabel} targets={resolvedTargets} toggleTarget={toggleTarget} addTarget={addTarget} removeTarget={removeTarget} paidCredits={paidCredits} paidPersonal={paidPersonal} paidAd={paidAd}/>
<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:4}}>
{[{label:"Barcha kreditlar",icon:'🏦',page:'credits',pct:stats.credit.pct},{label:"Navbat bo'yicha",icon:'⚡',page:'priority',pct:null}].map(it=>(

function SvgChart({data}){
const W=620,H=180,pad={t:10,r:10,b:24,l:34};
const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
const max=Math.max(1,...data.map(d=>d.paid));
const n=data.length;
const x=i=>pad.l+(n<=1?0:(i/(n-1))*cw);
const y=v=>pad.t+ch-(v/max)*ch;
const linePts=data.map((d,i)=>`${x(i)},${y(d.paid)}`).join(' ');
const areaPts=`${pad.l},${pad.t+ch} ${linePts} ${pad.l+cw},${pad.t+ch}`;
const yTicks=[0,max/2,max];
return(<div style={{width:'100%',overflow:'hidden'}}>
<svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block'}}>
<defs><linearGradient id="gp" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#C8F46A" stopOpacity="0.3"/><stop offset="100%" stopColor="#C8F46A" stopOpacity="0"/></linearGradient></defs>
{yTicks.map((t,i)=>(<g key={i}><line x1={pad.l} y1={y(t)} x2={pad.l+cw} y2={y(t)} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/><text x={pad.l-6} y={y(t)+3} textAnchor="end" fill="#5C5A6A" fontSize="9" fontFamily="var(--font-mono)">{Math.round(t)}</text></g>))}
<polygon points={areaPts} fill="url(#gp)"/>
<polyline points={linePts} fill="none" stroke="#C8F46A" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" style={{filter:'drop-shadow(0 0 4px rgba(200,244,106,0.5))'}}/>
{data.map((d,i)=>d.paid>0&&<circle key={i} cx={x(i)} cy={y(d.paid)} r="2.5" fill="#C8F46A"/>)}
{data.map((d,i)=>(i%2===0)&&<text key={i} x={x(i)} y={H-8} textAnchor="middle" fill="#5C5A6A" fontSize="9" fontFamily="var(--font-mono)">{d.name.split(' ')[0]}</text>)}
</svg>
</div>);
}

const totalCreditDebt=bankCredits.reduce((s,c)=>s+c.totalSum,0);
const paidCreditAmount=bankCredits.reduce((s,c)=>s+c.schedule.reduce((ss,p)=>ss+(paidCredits[`${c.id}:${p.month}`]?p.amount:0),0),0);
const totalPersonalDebt=personalDebts.reduce((s,d)=>s+d.amount,0);
const paidPersonalAmount=personalDebts.reduce((s,d)=>s+(paidPersonal[d.id]?d.amount:0),0);
const totalAdDebt=adDebts.reduce((s,d)=>s+d.amountUZS,0);
const paidAdAmount=adDebts.reduce((s,d)=>s+(paidAd[d.id]?d.amountUZS:0),0);
const totalDebt=totalCreditDebt+totalPersonalDebt+totalAdDebt;
const totalPaid=paidCreditAmount+paidPersonalAmount+paidAdAmount;
const stats={totalDebt,totalPaid,totalRemaining:totalDebt-totalPaid,overallPct:Math.min(100,Math.round((totalPaid/totalDebt)*100)),credit:{total:totalCreditDebt,paid:paidCreditAmount,pct:Math.min(100,Math.round((paidCreditAmount/totalCreditDebt)*100))},personal:{total:totalPersonalDebt,paid:paidPersonalAmount,pct:Math.min(100,Math.round((paidPersonalAmount/totalPersonalDebt)*100))},ad:{total:totalAdDebt,paid:paidAdAmount,pct:Math.min(100,Math.round((paidAdAmount/totalAdDebt)*100))}};
const sp={paidCredits,paidPersonal,paidAd,toggleCredit,togglePersonal,toggleAd,stats,setPage,monthTargets,addTarget,removeTarget};
return(<div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
<header style={{position:'sticky',top:0,zIndex:100,background:'rgba(10,10,15,0.85)',backdropFilter:'blur(20px)',borderBottom:'1px solid var(--border)',padding:'0 20px',display:'flex',alignItems:'center',justifyContent:'space-between',height:56}}>
<div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:20}}>🔓</span><span style={{fontFamily:'var(--font-serif)',fontStyle:'italic',fontSize:17,letterSpacing:'0.01em'}}>Qarzdan Ozodlik</span></div>
<div style={{display:'flex',alignItems:'center',gap:8,background:'var(--accent-dim2)',border:'1px solid var(--border)',borderRadius:30,padding:'4px 14px'}}><div style={{width:8,height:8,borderRadius:'50%',background:'var(--accent)',animation:stats.overallPct>0?'pulse-ring 2s infinite':'none'}}/><span style={{fontFamily:'var(--font-mono)',fontSize:13,color:'var(--accent)',fontWeight:500}}>{stats.overallPct}% ozod</span></div>
</header>
<main style={{flex:1,padding:'24px 20px 100px',maxWidth:680,margin:'0 auto',width:'100%'}}>
{page==='dashboard'&&<Dashboard {...sp}/>}
{page==='credits'&&<Credits {...sp}/>}
{page==='priority'&&<Priority {...sp}/>}
{page==='progress'&&<Progress {...sp}/>}
</main>
<nav style={{position:'fixed',bottom:0,left:0,right:0,zIndex:100,background:'rgba(17,17,24,0.95)',backdropFilter:'blur(20px)',borderTop:'1px solid var(--border)',display:'flex'}}>
{NAV.map(n=>{const active=page===n.id;return(<button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,border:'none',background:'transparent',display:'flex',flexDirection:'column',alignItems:'center',padding:'10px 8px 14px',gap:4,color:active?'var(--accent)':'var(--text3)',transition:'color 0.2s',position:'relative'}}><span style={{fontSize:18,lineHeight:1}}>{n.icon}</span><span style={{fontSize:10,fontWeight:active?600:400,letterSpacing:'0.04em'}}>{n.label.toUpperCase()}</span>{active&&<div style={{position:'absolute',bottom:0,width:20,height:2,borderRadius:1,background:'var(--accent)'}}/>}</button>);})}
</nav>
</div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
